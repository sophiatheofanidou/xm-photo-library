<section class="photos-page">
  <app-photo-grid
    [photos]="photos"
    (photoSelected)="addToFavorites($event)">
  </app-photo-grid>

  <div
    appInfiniteScroll
    class="photos-page__sentinel"
    (visible)="loadMorePhotos()">
  </div>

  @if (isLoading) {
    <div class="photos-page__loader">
      <mat-spinner
        diameter="40"
        aria-label="Loading photos">
      </mat-spinner>
    </div>
  }
</section>
