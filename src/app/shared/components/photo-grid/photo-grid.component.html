<div class="photo-grid">
  @for (photo of photos; track photo.id) {
    <button
      type="button"
      class="photo-grid__item"
      (click)="selectPhoto(photo)"
      [attr.aria-label]="'Select ' + photo.alt">
      <img
        class="photo-grid__image"
        [src]="photo.url"
        [alt]="photo.alt"
        loading="lazy">
    </button>
  }
</div>
